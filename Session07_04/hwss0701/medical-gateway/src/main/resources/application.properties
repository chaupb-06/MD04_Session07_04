spring.application.name=medical-gateway
#config port
server.port=8080
#config eureka client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
#config path

spring.cloud.gateway.server.webflux.routes[0].id=patient-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://PATIENT-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/patient-service/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=RewritePath=/patient-service/(?<segment>.*), /${segment}

spring.cloud.gateway.server.webflux.routes[1].id=doctor-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://DOCTOR-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/doctor-service/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=RewritePath=/doctor-service/(?<segment>.*), /${segment}

spring.cloud.gateway.server.webflux.routes[2].id=appointment-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://APPOINTMENT-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/appointment-service/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=RewritePath=/appointment-service/(?<segment>.*), /${segment}       